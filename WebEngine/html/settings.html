<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MusicShader - API 设置</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
    --surface: rgba(15, 23, 42, .68);
    --border: rgba(96, 165, 250, .2);
    --border-hover: rgba(96, 165, 250, .5);
    --text: #f8fafc;
    --muted: #94a3b8;
}
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background:
        radial-gradient(circle at 15% 0%, rgba(37, 99, 235, .2), transparent 38%),
        radial-gradient(circle at 90% 20%, rgba(124, 58, 237, .18), transparent 32%),
        linear-gradient(145deg, #020617, #071126 55%, #020617);
    color: var(--text); min-height: 100vh;
    display: flex; justify-content: center; align-items: center; padding: 20px;
}
.container { width: 100%; max-width: 580px; }
h1 { font-size: 24px; font-weight: 700; text-align: center; margin-bottom: 24px; color: #fff; text-shadow: 0 0 24px rgba(96,165,250,.28); }
h1 span { color: #818cf8; }

/* 预设卡片 */
.preset-row { display: flex; gap: 12px; margin-bottom: 20px; }
.preset-card {
    flex: 1; padding: 14px 16px; border-radius: 16px; cursor: pointer;
    background: var(--surface); border: 1px solid var(--border); transition: all .2s;
    text-align: center;
    backdrop-filter: blur(18px);
}
.preset-card:hover { border-color: var(--border-hover); background: rgba(37,99,235,.14); box-shadow: 0 12px 30px rgba(59,130,246,.16); transform: translateY(-1px); }
.preset-card.active { border-color: rgba(129,140,248,.65); background: linear-gradient(135deg,rgba(37,99,235,.24),rgba(124,58,237,.18)); box-shadow: 0 10px 28px rgba(59,130,246,.18); }
.preset-card .name { font-weight: 600; font-size: 15px; color: #fff; }
.preset-card .desc { font-size: 12px; color: var(--muted); margin-top: 4px; }

/* 表单卡片 */
.card {
    background: var(--surface); border-radius: 20px; padding: 24px;
    margin-bottom: 16px; border: 1px solid var(--border);
    box-shadow: 0 18px 45px rgba(2,6,23,.28); backdrop-filter: blur(20px);
}
.card:hover { border-color: rgba(96,165,250,.32); }
.card-title { font-size: 14px; font-weight: 600; color: #bfdbfe; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
.form-group { margin-bottom: 16px; }
.form-group:last-child { margin-bottom: 0; }
label { display: block; font-size: 13px; color: #cbd5e1; margin-bottom: 6px; }
.input-row { display: flex; gap: 8px; align-items: center; }
input {
    flex: 1; padding: 11px 14px; border-radius: 12px; border: 1px solid var(--border);
    background: rgba(2,6,23,.72); color: #e2e8f0; font-size: 14px; outline: none; transition: all .2s;
}
input:focus { border-color: var(--border-hover); box-shadow: 0 0 0 3px rgba(59,130,246,.12); }
input::placeholder { color: #475569; }
.btn-icon {
    padding: 10px 14px; border-radius: 12px; border: 1px solid var(--border);
    background: rgba(15,23,42,.76); color: #cbd5e1; cursor: pointer; font-size: 14px; transition: all .2s;
    white-space: nowrap;
}
.btn-icon:hover { border-color: var(--border-hover); color: #fff; background: rgba(59,130,246,.14); box-shadow: 0 8px 22px rgba(59,130,246,.16); }

/* 保存按钮 */
.btn-save {
    width: 100%; padding: 14px; border-radius: 16px; border: 1px solid rgba(191,219,254,.18);
    background: linear-gradient(135deg,#2563eb,#7c3aed); color: #fff; font-size: 16px; font-weight: 600;
    cursor: pointer; transition: all .2s; margin-top: 8px;
    box-shadow: 0 12px 32px rgba(59,130,246,.28);
}
.btn-save:hover { transform: translateY(-2px); box-shadow: 0 16px 38px rgba(59,130,246,.38); filter: brightness(1.08); }
.btn-save:active { transform: translateY(0); }

/* 状态提示 */
.status {
    text-align: center; margin-top: 12px; font-size: 13px; min-height: 20px;
    transition: opacity .3s;
}
.status.success { color: #4ade80; }
.status.error { color: #f87171; }

/* 底部信息 */
.footer { text-align: center; margin-top: 20px; font-size: 12px; color: #64748b; }
button:focus-visible,input:focus-visible { outline: 2px solid rgba(96,165,250,.8); outline-offset: 2px; }
@media (max-width: 520px) {
    body { padding: 14px; align-items: flex-start; }
    .preset-row { gap: 7px; }
    .preset-card { padding: 12px 7px; }
    .card { padding: 18px; border-radius: 18px; }
}
</style>
</head>
<body>
<div class="container">
    <h1>MusicShader <span>⚙</span> 设置</h1>

    <!-- 预设切换 -->
    <div class="preset-row">
        <div class="preset-card active" data-preset="openai" onclick="selectPreset('openai')">
            <div class="name">OpenAI</div>
            <div class="desc">gpt-4.1-mini</div>
        </div>
        <div class="preset-card" data-preset="deepseek" onclick="selectPreset('deepseek')">
            <div class="name">DeepSeek</div>
            <div class="desc">deepseek-chat</div>
        </div>
        <div class="preset-card" data-preset="custom" onclick="selectPreset('custom')">
            <div class="name">自定义</div>
            <div class="desc">手动配置</div>
        </div>
    </div>

    <!-- API Key -->
    <div class="card">
        <div class="card-title">API 密钥</div>
        <div class="form-group">
            <label>API Key（用于 Chat + Whisper 语音识别）</label>
            <div class="input-row">
                <input type="password" id="api_key" placeholder="sk-..." autocomplete="off">
                <button class="btn-icon" onclick="toggleKey()">👁</button>
            </div>
        </div>
    </div>

    <!-- API 地址 + Model -->
    <div class="card">
        <div class="card-title">API 配置</div>
        <div class="form-group">
            <label>Base URL</label>
            <input type="text" id="base_url" placeholder="https://api.openai.com/v1">
        </div>
        <div class="form-group">
            <label>Model</label>
            <input type="text" id="model" placeholder="gpt-4.1-mini">
        </div>
    </div>

    <!-- Speech API -->
    <div class="card">
        <div class="card-title">语音识别配置</div>
        <div class="form-group">
            <label>Speech API Key（OpenAI / Whisper 兼容，不支持 DeepSeek）</label>
            <div class="input-row">
                <input type="password" id="speech_api_key" placeholder="sk-..." autocomplete="off">
                <button class="btn-icon" onclick="toggleKey('speech_api_key')">👁</button>
            </div>
        </div>
        <div class="form-group">
            <label>Speech Base URL</label>
            <input type="text" id="speech_base_url" placeholder="https://api.openai.com/v1">
        </div>
        <div class="form-group">
            <label>Speech Model</label>
            <input type="text" id="speech_model" placeholder="whisper-1">
        </div>
    </div>

    <button class="btn-save" onclick="save()">💾 保存配置</button>
    <div class="status" id="status"></div>
    <div class="footer">MusicShader · 配置保存到 settings.json</div>
</div>

<script>
const presets = {
    openai:  { base_url: "https://api.openai.com/v1", model: "gpt-4.1-mini" },
    deepseek:{ base_url: "https://api.deepseek.com/v1", model: "deepseek-chat" },
};
let currentPreset = "custom";

function selectPreset(name) {
    currentPreset = name;
    document.querySelectorAll(".preset-card").forEach(c => c.classList.remove("active"));
    document.querySelector(`[data-preset="${name}"]`).classList.add("active");
    if (name !== "custom") {
        document.getElementById("base_url").value = presets[name].base_url;
        document.getElementById("model").value = presets[name].model;
    }
}

function toggleKey(id = "api_key") {
    const el = document.getElementById(id);
    el.type = el.type === "password" ? "text" : "password";
}

async function load() {
    try {
        const r = await fetch("/api/settings");
        const d = await r.json();
        if (d.api_key) document.getElementById("api_key").value = d.api_key;
        if (d.base_url) document.getElementById("base_url").value = d.base_url;
        if (d.model) document.getElementById("model").value = d.model;
        if (d.speech_api_key) document.getElementById("speech_api_key").value = d.speech_api_key;
        document.getElementById("speech_base_url").value = d.speech_base_url || "https://api.openai.com/v1";
        document.getElementById("speech_model").value = d.speech_model || "whisper-1";
        // 推断预设
        if (d.base_url === presets.openai.base_url && d.model === presets.openai.model) selectPreset("openai");
        else if (d.base_url === presets.deepseek.base_url && d.model === presets.deepseek.model) selectPreset("deepseek");
        else selectPreset("custom");
        setStatus("已加载当前配置", "success");
    } catch(e) {
        setStatus("无法加载配置：" + e.message, "error");
    }
}

async function save() {
    const data = {
        api_key: document.getElementById("api_key").value.trim(),
        base_url: document.getElementById("base_url").value.trim(),
        model: document.getElementById("model").value.trim(),
        speech_api_key: document.getElementById("speech_api_key").value.trim(),
        speech_base_url: document.getElementById("speech_base_url").value.trim(),
        speech_model: document.getElementById("speech_model").value.trim(),
    };
    if (!data.base_url) { setStatus("Base URL 不能为空", "error"); return; }
    if (!data.model) { setStatus("Model 不能为空", "error"); return; }
    if (!data.speech_base_url) { setStatus("Speech Base URL 不能为空", "error"); return; }
    if (!data.speech_model) { setStatus("Speech Model 不能为空", "error"); return; }
    try {
        const r = await fetch("/api/settings", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data),
        });
        const d = await r.json();
        if (d.ok) setStatus("✅ 配置已保存到 settings.json", "success");
        else setStatus("保存失败：" + (d.error || "未知错误"), "error");
    } catch(e) {
        setStatus("保存失败：" + e.message, "error");
    }
}

function setStatus(msg, cls) {
    const el = document.getElementById("status");
    el.textContent = msg;
    el.className = "status " + cls;
    if (cls === "success") setTimeout(() => { el.textContent = ""; el.className = "status"; }, 3000);
}

load();
</script>
</body>
</html>

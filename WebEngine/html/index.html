<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MusicShader</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#1a1a2e;color:#e0e0e0;height:100vh;display:flex;flex-direction:column;overflow:hidden}
/* header */
header{background:#16213e;padding:12px 20px;display:flex;align-items:center;gap:16px;border-bottom:1px solid #1e2d50;flex-shrink:0}
header h1{font-size:20px;color:#fff}
header h1 span{color:#6366f1}
nav{display:flex;gap:4px;margin-left:24px}
nav button{padding:8px 18px;border:none;border-radius:8px;cursor:pointer;font-size:14px;background:transparent;color:#888;transition:all .2s}
nav button:hover{background:#1e2d50;color:#ccc}
nav button.active{background:#6366f1;color:#fff}
/* main layout */
main{flex:1;display:flex;overflow:hidden}
.panel{display:none;flex:1}
.panel.active{display:flex}
/* chat panel */
#chat-panel{flex-direction:column}
#chat-messages{flex:1;overflow-y:auto;padding:16px}
#chat-messages .msg{display:flex;gap:10px;margin-bottom:12px;align-items:flex-start}
#chat-messages .msg.user{flex-direction:row-reverse}
#chat-messages .msg .avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
#chat-messages .msg.user .avatar{background:#6366f1;color:#fff}
#chat-messages .msg.ai .avatar{background:#1e2d50;color:#888;font-weight:bold}
#chat-messages .msg .bubble{max-width:70%;padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
#chat-messages .msg.user .bubble{background:#6366f1;color:#fff}
#chat-messages .msg.ai .bubble{background:#16213e;color:#ccc}
#chat-input-row{display:flex;gap:8px;padding:12px 16px;background:#16213e;border-top:1px solid #1e2d50}
#chat-input-row input{flex:1;padding:10px 14px;border-radius:8px;border:1px solid #2a2a4a;background:#0f0f23;color:#e0e0e0;font-size:14px;outline:none}
#chat-input-row input:focus{border-color:#6366f1}
#chat-input-row button{padding:10px 20px;border-radius:8px;border:none;background:#6366f1;color:#fff;cursor:pointer;font-size:14px;transition:all .2s}
#chat-input-row button:hover{background:#5558e6}
#chat-input-row button:disabled{opacity:.5;cursor:not-allowed}
/* right panel: code + controls */
#right-panel{width:420px;flex-shrink:0;flex-direction:column;background:#0f0f23;border-left:1px solid #1e2d50}
#code-editor{flex:1;width:100%;padding:14px;background:#0f0f23;color:#e0e0e0;border:none;resize:none;font-family:Consolas,"Courier New",monospace;font-size:13px;line-height:1.6;outline:none;tab-size:4}
#controls{display:flex;gap:8px;padding:10px 14px;background:#16213e;border-top:1px solid #1e2d50}
#controls button{padding:8px 16px;border-radius:6px;border:none;cursor:pointer;font-size:13px;transition:all .2s}
.btn-apply{background:#4ade80;color:#000;font-weight:600}
.btn-apply:hover{background:#3cc76a}
.btn-save{background:#1e2d50;color:#ccc}
.btn-save:hover{background:#2a3a60}
.btn-deploy{background:#6366f1;color:#fff}
.btn-deploy:hover{background:#5558e6}
#status-bar{padding:6px 14px;font-size:12px;color:#666;min-height:28px}
/* shader library */
#shader-panel{flex-direction:column;padding:20px;overflow-y:auto}
#shader-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.shader-card{background:#16213e;border-radius:10px;padding:14px;cursor:pointer;border:1px solid transparent;transition:all .2s}
.shader-card:hover{border-color:#6366f1;background:#1a2744}
.shader-card .card-name{font-size:14px;color:#fff;font-weight:500;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.shader-card .card-info{font-size:12px;color:#666}
/* settings panel iframe */
#settings-panel iframe{width:100%;height:100%;border:none}
/* loading spinner */
.spinner{display:inline-block;width:16px;height:16px;border:2px solid #6366f1;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
/* responsive */
@media(max-width:768px){main{flex-direction:column}#right-panel{width:100%;height:300px}}
</style>
</head>
<body>
<header>
    <h1>Music<span>S</span>hader</h1>
    <nav>
        <button class="tab active" data-tab="chat">💬 对话</button>
        <button class="tab" data-tab="shader">📂 Shader库</button>
        <button class="tab" data-tab="settings">⚙ 设置</button>
    </nav>
</header>
<main>
    <!-- Chat Panel -->
    <div id="chat-panel" class="panel active">
        <div id="chat-messages"></div>
        <div id="chat-input-row">
            <input id="chat-input" type="text" placeholder="描述你想要的视觉效果..." onkeydown="if(event.key==='Enter')sendMessage()">
            <button id="send-btn" onclick="sendMessage()">发送</button>
        </div>
    </div>
    <!-- Shader Library Panel -->
    <div id="shader-panel" class="panel"><div id="shader-grid"></div></div>
    <!-- Settings Panel -->
    <div id="settings-panel" class="panel"><iframe src="/settings.html"></iframe></div>

    <!-- Right: Code + Controls -->
    <div id="right-panel">
        <textarea id="code-editor" placeholder="// GLSL 代码将在生成后显示在这里&#10;// 也可以直接粘贴编辑" spellcheck="false"></textarea>
        <div id="controls">
            <button class="btn-apply" onclick="applyShader()">▶ 应用</button>
            <button class="btn-save" onclick="saveShader()">💾 保存</button>
            <button class="btn-deploy" onclick="deployShader()">🚀 部署到窗口</button>
        </div>
        <div id="status-bar">就绪</div>
    </div>
</main>
<script>
// ---- State ----
let currentCode = "";
let hasGeneratedOnce = false;
let currentPath = "";
let loading = false;

// ---- Tab navigation ----
document.querySelectorAll("nav button.tab").forEach(btn => {
    btn.addEventListener("click", () => {
        document.querySelectorAll("nav button.tab").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        const tab = btn.dataset.tab;
        document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
        document.getElementById(tab + "-panel").classList.add("active");
        if (tab === "shader") loadShaders();
    });
});

// ---- Chat ----
function addMessage(role, text) {
    const el = document.createElement("div");
    el.className = "msg " + role;
    el.innerHTML = `<div class="avatar">${role==="user"?"😎":"AI"}</div><div class="bubble">${escapeHtml(text)}</div>`;
    document.getElementById("chat-messages").appendChild(el);
    el.scrollIntoView({behavior:"smooth"});
}

async function sendMessage() {
    const input = document.getElementById("chat-input");
    const prompt = input.value.trim();
    if (!prompt || loading) return;
    input.value = "";
    addMessage("user", prompt);
    loading = true;
    setStatus("⏳ 生成中...");
    document.getElementById("send-btn").disabled = true;
    try {
        const r = await fetch("/api/chat", {
            method:"POST", headers:{"Content-Type":"application/json"},
            body: JSON.stringify({prompt, adjust: hasGeneratedOnce})
        });
        const d = await r.json();
        if (d.success && d.code) {
            currentCode = d.code;
            hasGeneratedOnce = true;
            document.getElementById("code-editor").value = d.code;
            addMessage("ai","✅ Shader 生成完成，可在右侧面板查看代码");
            setStatus("✅ 完成");
        } else {
            addMessage("ai","❌ 失败: " + (d.error||"未知错误"));
            setStatus("❌ " + (d.error||"失败"));
        }
    } catch(e) {
        addMessage("ai","❌ 网络错误: " + e.message);
        setStatus("❌ 网络错误");
    }
    loading = false;
    document.getElementById("send-btn").disabled = false;
}

// ---- Shader Library ----
async function loadShaders() {
    const grid = document.getElementById("shader-grid");
    grid.innerHTML = '<div class="spinner"></div>';
    try {
        const r = await fetch("/api/shaders");
        const files = await r.json();
        grid.innerHTML = files.map(f => `
            <div class="shader-card" onclick="loadShader('${f.path}','${f.name}')">
                <div class="card-name">${f.name}</div>
                <div class="card-info">${formatSize(f.size)} · ${f.modified}</div>
            </div>`).join("") || '<div style="color:#666;padding:20px">暂无 Shader 文件</div>';
    } catch(e) {
        grid.innerHTML = '<div style="color:#f87171">加载失败</div>';
    }
}

async function loadShader(path, name) {
    try {
        const r = await fetch("/api/shader?path=" + encodeURIComponent(path));
        const d = await r.json();
        if (d.code) {
            currentCode = d.code; currentPath = path;
            document.getElementById("code-editor").value = d.code;
            document.querySelectorAll("nav button.tab")[0].click(); // switch to chat
            setStatus("加载: " + name);
        } else {
            setStatus("❌ " + (d.error||"加载失败"));
        }
    } catch(e) { setStatus("❌ 网络错误"); }
}

// ---- Apply / Save / Deploy ----
function applyShader() {
    const code = document.getElementById("code-editor").value.trim();
    if (!code) { setStatus("⚠️ 无代码"); return; }
    currentCode = code;
    setStatus("✅ 已应用");
}

async function saveShader() {
    const code = document.getElementById("code-editor").value.trim();
    if (!code) { setStatus("⚠️ 无代码"); return; }
    const name = prompt("文件名（不含 .glsl）:", "");
    if (!name) return;
    try {
        const r = await fetch("/api/shader", {
            method:"POST", headers:{"Content-Type":"application/json"},
            body: JSON.stringify({code, name})
        });
        const d = await r.json();
        setStatus(d.ok ? "✅ 已保存: " + d.path : "❌ " + d.error);
    } catch(e) { setStatus("❌ 网络错误"); }
}

async function deployShader() {
    const code = document.getElementById("code-editor").value.trim();
    if (!code) { setStatus("⚠️ 无代码"); return; }
    setStatus("🚀 启动中...");
    try {
        const r = await fetch("/api/launch", {
            method:"POST", headers:{"Content-Type":"application/json"},
            body: JSON.stringify({code, path: currentPath})
        });
        const d = await r.json();
        setStatus(d.ok ? "✅ OpenGL 窗口已启动" : "❌ " + d.error);
    } catch(e) { setStatus("❌ 网络错误"); }
}

// ---- Utils ----
function setStatus(msg) { document.getElementById("status-bar").textContent = msg; }
function escapeHtml(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function formatSize(bytes) { return bytes<1024?bytes+"B":bytes<1048576?(bytes/1024).toFixed(1)+"KB":(bytes/1048576).toFixed(1)+"MB"; }

// ---- Init ----
addMessage("ai","🤖 MusicShader 就绪。描述你想要的视觉效果，AI 将生成 GLSL 着色器。\n支持 OpenAI 和 DeepSeek，请在 ⚙ 设置中配置 API Key。");
</script>
</body>
</html>

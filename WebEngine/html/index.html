<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MusicShader</title>
<style>
:root {
  --bg: #0f0e17; --surface: #1a1930; --border: #2d2a4a;
  --accent: #7f5af0; --accent2: #2cb67d; --text: #fffffe; --text2: #94a1b2;
  --danger: #e53170; --warn: #f9c74f;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Segoe UI",system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* header */
header{
  background:linear-gradient(135deg, #1a1930 0%, #232052 100%);
  padding:10px 20px;display:flex;align-items:center;gap:16px;
  border-bottom:1px solid var(--border);flex-shrink:0;box-shadow:0 2px 12px rgba(0,0,0,.3);
}
.logo{font-size:22px;font-weight:800;letter-spacing:-0.5px}
.logo .ms{color:var(--accent)}.logo .s{color:var(--accent2)}
.logo-sub{font-size:11px;color:var(--text2);margin-left:6px;font-weight:400}
nav{display:flex;gap:2px;margin-left:20px}
nav button{
  padding:8px 16px;border:none;border-radius:10px;cursor:pointer;
  font-size:13px;background:transparent;color:var(--text2);transition:all .2s;
  position:relative;
}
nav button:hover{background:rgba(127,90,240,.1);color:var(--text)}
nav button.active{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(127,90,240,.4)}
nav button .badge{
  position:absolute;top:-4px;right:-4px;background:var(--accent2);color:#000;
  font-size:10px;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;
}

/* main */
main{flex:1;display:flex;overflow:hidden}
.panel{display:none;flex:1}
.panel.active{display:flex}

/* shared card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px}

/* ---- Chat Panel ---- */
#chat-panel{flex-direction:column}
#chat-messages{flex:1;overflow-y:auto;padding:16px 20px;scroll-behavior:smooth}
.msg{display:flex;gap:10px;margin-bottom:14px;align-items:flex-start;animation:fadeIn .3s}
.msg.user{flex-direction:row-reverse}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg .avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.msg.user .avatar{background:linear-gradient(135deg,var(--accent),#624de3);color:#fff}
.msg.ai .avatar{background:var(--surface);color:var(--text2);font-weight:700;border:1px solid var(--border)}
.msg .bubble{max-width:72%;padding:12px 16px;border-radius:14px;font-size:13.5px;line-height:1.55;white-space:pre-wrap;word-break:break-word}
.msg.user .bubble{background:var(--accent);color:#fff;border-bottom-right-radius:4px}
.msg.ai .bubble{background:var(--surface);color:#ccc;border:1px solid var(--border);border-bottom-left-radius:4px}
.msg .bubble code{background:rgba(0,0,0,.3);padding:2px 6px;border-radius:4px;font-size:12px}
#chat-input-row{display:flex;gap:8px;padding:12px 16px;background:var(--surface);border-top:1px solid var(--border)}
#chat-input-row input{flex:1;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;outline:none;transition:border .2s}
#chat-input-row input:focus{border-color:var(--accent)}
#chat-input-row button{padding:10px 22px;border-radius:10px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-size:14px;font-weight:600;transition:all .2s;box-shadow:0 2px 8px rgba(127,90,240,.3)}
#chat-input-row button:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(127,90,240,.5)}
#chat-input-row button:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* ---- Preview Panel (WebGL) ---- */
#preview-panel{position:relative;align-items:center;justify-content:center;background:#000}
#preview-panel canvas{width:100%;height:100%;display:block}
#preview-overlay{
  position:absolute;bottom:12px;left:12px;right:12px;
  display:flex;gap:8px;align-items:center;font-size:12px;color:var(--text2);
}
#preview-overlay .tag{background:rgba(0,0,0,.6);padding:4px 10px;border-radius:6px}
.preview-error{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:var(--danger);text-align:center;max-width:80%;font-size:14px;line-height:1.6}

/* ---- Shader Library ---- */
#shader-panel{flex-direction:column;padding:20px 24px;overflow-y:auto}
#shader-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px}
.shader-card{background:var(--surface);border-radius:12px;padding:16px;cursor:pointer;border:1px solid var(--border);transition:all .2s}
.shader-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 16px rgba(127,90,240,.15)}
.shader-card .card-icon{font-size:28px;margin-bottom:8px}
.shader-card .card-name{font-size:14px;color:var(--text);font-weight:600;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.shader-card .card-info{font-size:11px;color:var(--text2)}

/* ---- Music Library ---- */
#music-panel{flex-direction:column;padding:20px 24px;overflow-y:auto}
.section-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-title .icon{font-size:20px}
#music-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px}
.music-card{background:var(--surface);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;border:1px solid var(--border);transition:all .2s}
.music-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 16px rgba(127,90,240,.15)}
.music-card.selected{border-color:var(--accent2);box-shadow:0 0 0 2px rgba(44,182,125,.3)}
.music-card .music-icon{font-size:26px;flex-shrink:0}
.music-card .music-info{overflow:hidden;flex:1}
.music-card .music-name{font-size:13px;color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.music-card .music-folder{font-size:11px;color:var(--text2);margin-top:3px}
.music-card .music-badge{font-size:10px;background:var(--accent);color:#fff;padding:2px 8px;border-radius:10px;white-space:nowrap}

/* ---- Settings ---- */
#settings-panel iframe{width:100%;height:100%;border:none}

/* ---- Right Panel: Code ---- */
#right-panel{
  width:420px;flex-shrink:0;flex-direction:column;
  background:var(--surface);border-left:1px solid var(--border);
}
#right-panel-header{
  padding:10px 14px;border-bottom:1px solid var(--border);
  font-size:12px;color:var(--text2);font-weight:600;letter-spacing:0.5px;
  display:flex;gap:8px;align-items:center;
}
#right-panel-header .dot{width:8px;height:8px;border-radius:50%;background:var(--accent2)}
#code-editor{
  flex:1;width:100%;padding:14px;background:var(--bg);color:#c9d1d9;
  border:none;resize:none;font-family:"Cascadia Code","Fira Code",Consolas,monospace;
  font-size:12.5px;line-height:1.65;outline:none;tab-size:4;
}
#controls{display:flex;gap:8px;padding:10px 14px;background:var(--surface);border-top:1px solid var(--border)}
#controls button{padding:8px 14px;border-radius:8px;border:none;cursor:pointer;font-size:12.5px;font-weight:600;transition:all .2s;flex:1}
.btn-apply{background:var(--accent2);color:#000}
.btn-apply:hover{background:#3cc76a}
.btn-save{background:rgba(127,90,240,.15);color:var(--accent)}
.btn-save:hover{background:rgba(127,90,240,.25)}
.btn-deploy{background:linear-gradient(135deg,var(--accent),#624de3);color:#fff}
.btn-deploy:hover{opacity:.9;transform:translateY(-1px)}
#status-bar{padding:8px 14px;font-size:11px;color:var(--text2);min-height:28px;border-top:1px solid var(--border)}

/* spinner */
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--accent);border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

/* responsive */
@media(max-width:900px){main{flex-direction:column}#right-panel{width:100%;height:300px}}
@media(max-width:600px){nav button{padding:6px 10px;font-size:12px}}
</style>
</head>
<body>
<header>
  <div class="logo"><span class="ms">Music</span><span class="s">S</span>hader <span class="logo-sub">AI-Powered</span></div>
  <nav>
    <button class="tab active" data-tab="chat">💬 对话</button>
    <button class="tab" data-tab="preview">👁 预览</button>
    <button class="tab" data-tab="shader">📂 库</button>
    <button class="tab" data-tab="music">🎵 音乐 <span class="badge" id="music-count">0</span></button>
    <button class="tab" data-tab="settings">⚙</button>
  </nav>
</header>

<main>
  <!-- Chat -->
  <div id="chat-panel" class="panel active">
    <div id="chat-messages"></div>
    <div id="chat-input-row">
      <input id="chat-input" type="text" placeholder="描述你想要的视觉效果... (Enter 发送)" onkeydown="if(event.key==='Enter')sendMessage()">
      <button id="send-btn" onclick="sendMessage()">发送</button>
    </div>
  </div>

  <!-- Preview (WebGL) -->
  <div id="preview-panel" class="panel">
    <canvas id="gl-canvas"></canvas>
    <div id="preview-overlay"></div>
    <div class="preview-error" id="preview-error" style="display:none"></div>
  </div>

  <!-- Shader Library -->
  <div id="shader-panel" class="panel">
    <div class="section-title"><span class="icon">📂</span> Shader 库</div>
    <div id="shader-grid"></div>
  </div>

  <!-- Music Library -->
  <div id="music-panel" class="panel">
    <div class="section-title"><span class="icon">🎵</span> 音乐库 <span style="font-size:12px;color:var(--text2);font-weight:400;margin-left:8px">点击文件选中，自动填入对话引用</span></div>
    <div id="music-grid"></div>
  </div>

  <!-- Settings -->
  <div id="settings-panel" class="panel"><iframe src="/settings.html"></iframe></div>

  <!-- Right: Code Editor -->
  <div id="right-panel">
    <div id="right-panel-header"><span class="dot"></span> GLSL 代码编辑器</div>
    <textarea id="code-editor" placeholder="// GLSL 代码将在 AI 生成后显示在这里&#10;// 也可以直接粘贴 GLSL 代码编辑&#10;// 点击 👁 预览 Tab 查看实时渲染效果" spellcheck="false"></textarea>
    <div id="controls">
      <button class="btn-apply" onclick="applyShader()">▶ 应用</button>
      <button class="btn-save" onclick="saveShader()">💾 保存</button>
      <button class="btn-deploy" onclick="deployShader()">🚀 部署</button>
    </div>
    <div id="status-bar">就绪</div>
  </div>
</main>

<script>
// ============ State ============
let currentCode = "", hasGeneratedOnce = false, currentPath = "", loading = false;
let selectedMusic = null;

// ============ Tab Nav ============
document.querySelectorAll("nav button.tab").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll("nav button.tab").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    const tab = btn.dataset.tab;
    document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
    const panel = document.getElementById(tab + "-panel");
    if (panel) panel.classList.add("active");
    if (tab === "shader") loadShaders();
    if (tab === "music") loadMusic();
    if (tab === "preview") startPreview();
  });
});

// ============ Chat ============
function addMessage(role, text) {
  const el = document.createElement("div");
  el.className = "msg " + role;
  el.innerHTML = `<div class="avatar">${role==="user"?"😎":"AI"}</div><div class="bubble">${esc(text)}</div>`;
  document.getElementById("chat-messages").appendChild(el);
  el.scrollIntoView({behavior:"smooth"});
}
async function sendMessage() {
  const input = document.getElementById("chat-input");
  const prompt = input.value.trim();
  if (!prompt || loading) return;
  input.value = ""; addMessage("user", prompt);
  loading = true; setStatus("⏳ 生成中...");
  document.getElementById("send-btn").disabled = true;
  try {
    const r = await fetch("/api/chat", {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({prompt,adjust:hasGeneratedOnce})});
    const d = await r.json();
    if (d.success && d.code) {
      currentCode = d.code; hasGeneratedOnce = true;
      document.getElementById("code-editor").value = d.code;
      addMessage("ai","✅ Shader 生成完成");
      setStatus("✅ 完成 — 点击 👁 预览 查看渲染");
      startPreview(); // auto-start preview
    } else { addMessage("ai","❌ 失败: "+(d.error||"未知")); setStatus("❌ "+d.error); }
  } catch(e) { addMessage("ai","❌ 网络错误"); setStatus("❌ 网络错误"); }
  loading = false; document.getElementById("send-btn").disabled = false;
}

// ============ Shader Lib ============
async function loadShaders() {
  const grid = document.getElementById("shader-grid");
  grid.innerHTML = '<div class="spinner"></div>';
  const r = await fetch("/api/shaders");
  const files = await r.json();
  const icons = {".glsl":"🎨",".frag":"✨"};
  grid.innerHTML = files.length ? files.map(f => `<div class="shader-card" onclick="loadShader('${f.path}','${f.name}')">
    <div class="card-icon">${icons[f.name.slice(-5)]||"📄"}</div>
    <div class="card-name">${f.name}</div>
    <div class="card-info">${fmtSize(f.size)} · ${f.modified}</div>
  </div>`).join("") : '<div style="color:var(--text2);padding:20px;text-align:center">暂无 Shader 文件</div>';
}
async function loadShader(path, name) {
  const r = await fetch("/api/shader?path="+encodeURIComponent(path));
  const d = await r.json();
  if (d.code) { currentCode=d.code;currentPath=path;document.getElementById("code-editor").value=d.code; document.querySelector('[data-tab="chat"]').click(); setStatus("加载: "+name); }
  else setStatus("❌ "+d.error);
}

// ============ Music ============
async function loadMusic() {
  const grid = document.getElementById("music-grid");
  grid.innerHTML = '<div class="spinner"></div>';
  const r = await fetch("/api/music");
  const files = await r.json();
  const icons = {".json":"📊",".csv":"📋",".wav":"🎵",".mp3":"🎧",".txt":"📝"};
  document.getElementById("music-count").textContent = files.length;
  grid.innerHTML = files.length ? files.map(f => `<div class="music-card${selectedMusic&&selectedMusic.path===f.path?' selected':''}" onclick="selectMusic('${f.path}','${f.name}','${f.folder}')">
    <div class="music-icon">${icons[f.suffix]||"🎵"}</div>
    <div class="music-info"><div class="music-name">${f.name}</div><div class="music-folder">${f.folder||'music/'} · ${fmtSize(f.size)}</div></div>
    <div class="music-badge">${f.suffix}</div>
  </div>`).join("") : '<div style="color:var(--text2);padding:20px;text-align:center">暂无音乐文件<br><small>将音频数据文件(.json/.csv/.wav)放入 music/ 目录</small></div>';
}
function selectMusic(path, name, folder) {
  selectedMusic = selectedMusic && selectedMusic.path === path ? null : {path, name, folder};
  loadMusic();
  if (selectedMusic) {
    const ref = `[音乐: ${selectedMusic.path}]`;
    const inp = document.getElementById("chat-input");
    if (!inp.value.includes(ref)) { inp.value = inp.value ? inp.value+" "+ref : ref; inp.focus(); }
    setStatus("已选中: "+name);
  } else setStatus("已取消");
}

// ============ WebGL Preview ============
let gl=null, glProgram=null, glAnimId=null, glStartTime=0;
const VERTEX_SRC = `#version 300 es
precision highp float;
in vec2 aPos;
out vec2 vUv;
void main(){vUv=aPos*0.5+0.5;gl_Position=vec4(aPos,0.,1.);}`;

function initGL() {
  const canvas = document.getElementById("gl-canvas");
  gl = canvas.getContext("webgl2", {alpha:false}) || canvas.getContext("webgl", {alpha:false});
  if (!gl) return false;
  // Fullscreen quad
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
  // Vertex shader
  const vs = gl.createShader(gl.VERTEX_SHADER);
  gl.shaderSource(vs, VERTEX_SRC); gl.compileShader(vs);
  return !!gl.getShaderParameter(vs, gl.COMPILE_STATUS);
}
function compileFragment(src) {
  if (!gl) return null;
  // Patch: gl_FragColor → out
  let code = src;
  if (code.includes("gl_FragColor") && !code.includes("out vec4")) code = code.replace(/void\s+mainImage/, "out vec4 fragColor;\nvoid mainImage");
  code = code.replace(/\bgl_FragColor\b/g, "fragColor");
  const fs = gl.createShader(gl.FRAGMENT_SHADER);
  gl.shaderSource(fs, code); gl.compileShader(fs);
  if (!gl.getShaderParameter(fs, gl.COMPILE_STATUS)) return gl.getShaderInfoLog(fs);
  if (glProgram) gl.deleteProgram(glProgram);
  glProgram = gl.createProgram();
  gl.attachShader(glProgram, gl.createShader(gl.VERTEX_SHADER)); // re-compile vs
  const vvs = gl.createShader(gl.VERTEX_SHADER); gl.shaderSource(vvs,VERTEX_SRC); gl.compileShader(vvs);
  gl.attachShader(glProgram, vvs); gl.attachShader(glProgram, fs);
  // Also re-attach already compiled vs
  gl.linkProgram(glProgram);
  if (!gl.getProgramParameter(glProgram, gl.LINK_STATUS)) return gl.getProgramInfoLog(glProgram);
  gl.useProgram(glProgram);
  // Uniforms
  const aPos = gl.getAttribLocation(glProgram, "aPos");
  const buf2 = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf2);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);
  // Audio noise texture
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  const noise = new Uint8Array(512*2*4);
  for (let i=0;i<512*2;i++) { const v=Math.random()*255; noise[i*4]=v;noise[i*4+1]=v;noise[i*4+2]=v;noise[i*4+3]=255; }
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,512,2,0,gl.RGBA,gl.UNSIGNED_BYTE,noise);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
  glStartTime = performance.now()/1000;
  return null; // no error
}
function renderGL() {
  if (!gl || !glProgram) return;
  const canvas = gl.canvas;
  const dpr = window.devicePixelRatio||1;
  const w = canvas.clientWidth*dpr, h = canvas.clientHeight*dpr;
  if (canvas.width!==w||canvas.height!==h) { canvas.width=w; canvas.height=h; gl.viewport(0,0,w,h); }
  const iTime = gl.getUniformLocation(glProgram, "iTime");
  const iRes = gl.getUniformLocation(glProgram, "iResolution");
  if (iTime) gl.uniform1f(iTime, performance.now()/1000 - glStartTime);
  if (iRes) gl.uniform3f(iRes, w, h, 0);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}
function startPreview() {
  const el = document.getElementById("preview-error");
  el.style.display = "none";
  if (!initGL()) { el.style.display="block";el.textContent="WebGL 不可用"; return; }
  const code = document.getElementById("code-editor").value.trim();
  if (!code) { el.style.display="block";el.textContent="请先生成或加载 Shader 代码"; return; }
  const err = compileFragment(code);
  if (err) { el.style.display="block";el.textContent="编译错误:\n"+err; return; }
  updatePreviewOverlay();
  if (glAnimId) cancelAnimationFrame(glAnimId);
  function loop() { renderGL(); glAnimId = requestAnimationFrame(loop); }
  loop();
}
function updatePreviewOverlay() {
  document.getElementById("preview-overlay").innerHTML = `<span class="tag">FPS</span><span class="tag">WebGL</span><span class="tag">实时渲染</span>`;
}
function stopPreview() { if (glAnimId) { cancelAnimationFrame(glAnimId); glAnimId=null; } }
// Debounce preview on code change
let previewTimer=null;
document.getElementById("code-editor").addEventListener("input",()=>{
  clearTimeout(previewTimer);
  previewTimer=setTimeout(()=>{ if(document.getElementById("preview-panel").classList.contains("active")) startPreview(); }, 800);
});

// ============ Apply / Save / Deploy ============
function applyShader() {
  const code = document.getElementById("code-editor").value.trim();
  if (!code) { setStatus("无代码"); return; }
  currentCode = code; setStatus("已应用");
  if (document.getElementById("preview-panel").classList.contains("active")) startPreview();
}
async function saveShader() {
  const code = document.getElementById("code-editor").value.trim();
  if (!code) { setStatus("无代码"); return; }
  const name = prompt("文件名（不含 .glsl）:",""); if (!name) return;
  const r = await fetch("/api/shader",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({code,name})});
  const d = await r.json();
  setStatus(d.ok ? "已保存: "+d.path : "❌ "+d.error);
}
async function deployShader() {
  const code = document.getElementById("code-editor").value.trim();
  if (!code) { setStatus("无代码"); return; }
  setStatus("启动中...");
  const r = await fetch("/api/launch",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({code,path:currentPath})});
  const d = await r.json();
  setStatus(d.ok ? "OpenGL 窗口已启动" : "❌ "+d.error);
}

// ============ Utils ============
function setStatus(msg) { document.getElementById("status-bar").textContent = msg; }
function esc(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/```(\w*)\n?([\s\S]*?)```/g,'<code>$2</code>'); }
function fmtSize(b) { return b<1024?b+"B":b<1048576?(b/1024).toFixed(1)+"KB":(b/1048576).toFixed(1)+"MB"; }
